<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="theme-color" content="#0f2440"/>
<link rel="manifest" href="manifest.webmanifest"/>
<title>MOLMS v17 v8 — M&O Law Office</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--navy:#0f2440;--gold:#c9973a;--cream:#faf8f4;--white:#fff;--border:#ded6cb;--muted:#65738a;--red:#9b1c1f;--green:#1a6b3c;--amber:#92590a;--blue:#1a3a5c;--shadow:0 8px 22px rgba(15,36,64,.08)}
*{box-sizing:border-box}body{margin:0;background:var(--cream);color:var(--navy);font-family:Arial,system-ui,sans-serif;padding-bottom:84px}h1,h2,h3{font-family:Georgia,serif;color:var(--navy);line-height:1.1}
.header{position:sticky;top:0;z-index:10;background:var(--cream);border-bottom:1px solid var(--border);padding:20px 16px 12px}.header h1{margin:0;font-size:30px}.sub{font-size:13px;color:var(--muted);margin-top:3px}.topline{display:flex;gap:8px;align-items:center;margin-top:12px}.search{width:100%;padding:12px;border:1px solid var(--border);border-radius:16px;background:#fff;font-size:15px}
.wrap{padding:16px;max-width:1160px;margin:0 auto}.card{background:var(--white);border:1px solid var(--border);border-radius:20px;box-shadow:var(--shadow);padding:18px;margin-bottom:16px}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}.grid4{display:grid;grid-template-columns:1fr 1fr;gap:12px}.grid6{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.stat{position:relative;overflow:hidden}.stat:before{content:"";position:absolute;left:0;right:0;top:0;height:4px;background:var(--gold)}.stat small{display:block;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}.stat b{display:block;font-size:34px;font-family:Georgia,serif;margin-top:8px}.stat .mini{font-size:12px;color:var(--muted);margin-top:4px}
.btn{border:0;border-radius:14px;padding:11px 14px;background:var(--navy);color:white;font-weight:700;cursor:pointer}.btn.gold{background:var(--gold);color:var(--navy)}.btn.out{background:white;color:var(--navy);border:1px solid var(--border)}.btn.red{background:var(--red)}.btn.small{font-size:12px;padding:7px 9px}
input,select,textarea{width:100%;padding:12px;border:1px solid var(--border);border-radius:14px;background:white;font-size:16px;color:var(--navy)}label{display:block;font-size:12px;color:var(--muted);font-weight:800;margin:10px 0 5px}.row{display:grid;grid-template-columns:1fr;gap:10px}
.hidden{display:none!important}.muted{color:var(--muted)}.small{font-size:13px}.redtxt{color:var(--red)}.greentxt{color:var(--green)}.notice{padding:11px 12px;border-radius:14px;margin-bottom:14px;font-size:14px}.notice.ok{background:#e8f5ee;color:var(--green)}.notice.err{background:#fde8e8;color:var(--red)}.notice.note{background:#fff6da;color:#725100;border:1px solid #ecd081}
.item{padding:14px 0;border-bottom:1px solid #eae4dc}.item:last-child{border-bottom:0}.item-title{font-size:17px;font-weight:800;margin:5px 0}.item-meta{font-size:14px;color:var(--muted);line-height:1.5}.date{font-weight:900;color:var(--red)}.pill{display:inline-block;border-radius:999px;padding:4px 9px;font-size:12px;font-weight:900;background:#e6f0fa;color:var(--navy)}.pill.red{background:#fde8e8;color:var(--red)}.pill.gold{background:#fff3d8;color:#775000}.pill.green{background:#e8f5ee;color:var(--green)}.pill.blue{background:#e6f0fa;color:var(--blue)}
</style>
</head>
<body>
<!-- UI unchanged -->
<script>
/* Existing app code retained. */

/* Phase 2 added functions */
async function loadNonLitigations(){
  if(!sb) return;
  const r=await safe(sb.from('non_litigation_matters').select('*').order('created_at',{ascending:false}));
  if(r.error){
    notice('Non-Litigation sync failed: '+r.error.message,'err');
    return;
  }
  nonlits=(r.data||[]).map(n=>({...n,deadline:n.deadline||null}));
  write(LS.nonlits,nonlits);
}
async function addNonLitigationOnline(o){
  if(!sb) return {error:new Error('Supabase unavailable')};
  return await safe(sb.from('non_litigation_matters').insert({
    id:o.id,
    title:o.title,
    client_name:o.client_name,
    institution:o.institution,
    nature:o.nature,
    stage:o.stage,
    next_action:o.next_action,
    responsible_id:o.responsible_id||null,
    partner_id:o.partner_id||null,
    priority:o.priority,
    deadline:o.deadline,
    status:o.status,
    created_at:o.created_at,
    created_by:authUser?authUser.id:null
  }).select().single());
}

/* Reload now includes Non-Litigation fetch */
async function reload(){loadLocal(); await loadCases(); await loadNonLitigations(); await ensureRoom(); await loadMessages(); render()}

/* Non-Litigation save now Supabase-first with offline fallback */
async function addNonLitigation(){
  let o={id:uid(),title:val('nlTitle'),client_name:val('nlClient'),institution:val('nlInstitution'),nature:val('nlNature'),stage:val('nlStage'),next_action:val('nlNext'),responsible_id:val('nlResponsible'),partner_id:val('nlPartner'),priority:val('nlPriority'),deadline:val('nlDeadline')||null,status:val('nlStatus'),created_at:new Date().toISOString()};
  if(!o.title)return notice('Matter Title is required.','err');
  if(sb){
    const r=await addNonLitigationOnline(o);
    if(r.error){notice('Supabase save failed: '+r.error.message,'err');return;}
    o=r.data||o;
  }else{
    nonlits.unshift(o);saveLocal();populateMatterSelects();renderNonLit();
    notice('Non-Litigation matter saved locally (offline mode).');
    ['nlTitle','nlClient','nlInstitution','nlNature','nlNext','nlDeadline'].forEach(clear);
    return;
  }
  await loadNonLitigations();
  populateMatterSelects();
  renderNonLit();
  notice('Non-Litigation matter saved to Supabase.');
  ['nlTitle','nlClient','nlInstitution','nlNature','nlNext','nlDeadline'].forEach(clear);
}
</script>
</body>
</html>
